# GitHub Actions 下载脚本配置
log: pretty

dir_rule:
  base_dir: ${JM_DOWNLOAD_DIR}
  # 使用完整路径与大括号包裹，斜杠前是基础下载目录，斜杠后是“本子ID_本子名称”，确保只有绝对的两层
  rule: '${JM_DOWNLOAD_DIR}/{Aid}_{Atitle}'

# 【关键补充】防止“上+下”等多章节本子的同名图片互相覆盖！
# 开启后，图片会按照“章节号_图片名.jpg”命名（例如：1_00001.jpg 和 2_00001.jpg，安全存放在同一个文件夹内）
image_rule: Pindex_Fname

client:
  impl: api # 使用api可免登录下载本子
  domain:
    html: [ jmcomic1.me, jmcomic.me ]

# 插件配置
plugins:
  after_init:
    - plugin: usage_log # 实时打印硬件占用率的插件
      kwargs:
        interval: 0.5 # 间隔时间
        enable_warning: false # 不告警

    - plugin: client_proxy # 提高移动端的请求效率的插件
      kwargs:
        proxy_client_key: photo_concurrent_fetcher_proxy
        whitelist: [ api, ]

    - plugin: login # 登录插件
      kwargs:
        username: ${JM_USERNAME}
        password: ${JM_PASSWORD}

  after_download: # 全部下载完成以后
    - plugin: send_qq_email # 发送邮件，如果未配置下面的前3个环境变量则不会发送。
      kwargs:
        msg_from: ${EMAIL_FROM}
        msg_to: ${EMAIL_TO}
        password: ${EMAIL_PASS}
        title: ${EMAIL_TITLE}
        content: ${EMAIL_CONTENT}
