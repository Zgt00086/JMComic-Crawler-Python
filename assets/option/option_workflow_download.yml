log: pretty

dir_rule:
  base_dir: ${JM_DOWNLOAD_DIR}
  # Aid=本子数字ID(350234)  Atitle=本子标题(董卓)
  rule: Aid_Atitle
  # 强制不分册嵌套，图片直接在本子文件夹里
  with_folder: false

client:
  impl: api
  domain:
    html: [ jmcomic1.me, shturl.cc/ ]

plugins:
  after_init:
    - plugin: usage_log
      kwargs:
        interval: 0.5
        enable_warning: false

    - plugin: client_proxy
      kwargs:
        proxy_client_key: photo_concurrent_fetcher_proxy
        whitelist: [ api, ]

    - plugin: login
      kwargs:
        username: ${JM_USERNAME}
        password: ${JM_PASSWORD}

  after_download:
    - plugin: send_qq_email
      kwargs:
        msg_from: ${EMAIL_FROM}
        msg_to: ${EMAIL_TO}
        password: ${EMAIL_PASS}
        title: ${EMAIL_TITLE}
        content: ${EMAIL_CONTENT}
